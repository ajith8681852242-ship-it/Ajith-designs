<script>
    const IMAGE_PATHS = { simple: "Label Packaging Design 1.png", creative: "Label Design 2.jpg" };

    const FESTIVAL_DB = [
    { name: "Test Offer", start: { month: 4, date: 7, hour: 0, min: 0 }, end: { month: 4, date: 7, hour: 23, min: 59 }, label: "Special <span class='free-blink'>Offer</span>" },

    { name: "Tamil New Year & Vishu", start: { month: 4, date: 8, hour: 0, min: 0 }, end: { month: 4, date: 14, hour: 23, min: 59 }, label: "Tamil New Year <span class='free-blink'>Mega Offer</span>" },

    { name: "Onam", start: { month: 8, date: 19, hour: 0, min: 0 }, end: { month: 8, date: 26, hour: 23, min: 59 }, label: "Onam Special <span class='free-blink'>Offer</span>" },
    { name: "Vinayagar Chaturthi", start: { month: 9, date: 8, hour: 0, min: 0 }, end: { month: 9, date: 14, hour: 23, min: 59 }, label: "Vinayagar Chaturthi <span class='free-blink'>Offer</span>" },
    { name: "Ayudha & Saraswathi Puja", start: { month: 10, date: 14, hour: 0, min: 0 }, end: { month: 10, date: 20, hour: 23, min: 59 }, label: "Ayudha & Saraswathi Puja <span class='free-blink'>Special Sale</span>" },
    { name: "Deepavali", start: { month: 11, date: 1, hour: 0, min: 0 }, end: { month: 11, date: 8, hour: 23, min: 59 }, label: "Deepavali <span class='free-blink'>Mega Dhamaka</span>" },
    { name: "Christmas", start: { month: 12, date: 18, hour: 0, min: 0 }, end: { month: 12, date: 25, hour: 23, min: 59 }, label: "Christmas <span class='free-blink'>Special Offer</span>" },
    { name: "New Year 2027", start: { month: 12, date: 26, hour: 0, min: 0 }, end: { month: 1, date: 1, hour: 23, min: 59 }, label: "New Year <span class='free-blink'>Offer</span>" }
];

    const PRICES_NORMAL = { 
        simple: 300, creative: 400, 
        list_s: ["Simple Banner Design", "High Quality Print Files", "Limited Revisions", "Fast Delivery"], 
        list_c: ["Creative Banner Design", "High Quality Print Files", "Un Limited Revisions", "Fast Delivery"] 
    };
    
    const PRICES_OFFER = { 
        simple: 200, creative: 300, 
        list_s: ["Simple Banner Design", "High Quality Print Files", "Limited Revisions", "Fast Delivery"], 
        list_c: ["Creative Banner Design", "High Quality Print Files", "Un Limited Revisions", "Fast Delivery"] 
    };

    let activeStyle = 'simple';
    let qty = 1;
    let currentFestival = null;
    let timerInterval;

    function initApp() {
        setInterval(checkFestivalRealTime, 1000);
        updateUI();
    }

    function checkFestivalRealTime() {
        const now = new Date();
        const year = now.getFullYear();
        const foundFestival = FESTIVAL_DB.find(f => {
            let startYear = year;
            let endYear = year;
            if (f.name.includes("New Year 2027") && f.end.month === 1) endYear = year + 1;
            const start = new Date(startYear, f.start.month - 1, f.start.date, f.start.hour, f.start.min);
            const end = new Date(endYear, f.end.month - 1, f.end.date, f.end.hour, f.end.min);
            return now >= start && now <= end;
        });

        if (JSON.stringify(foundFestival) !== JSON.stringify(currentFestival)) {
            currentFestival = foundFestival;
            const timerBox = document.getElementById('timerBox');
            const mainHeading = document.getElementById('mainHeading');

            if (currentFestival) {
                mainHeading.innerText = "CHOOSE YOUR STYLE";
                timerBox.style.display = "flex";
                startCountdown(currentFestival);
                document.getElementById('best-price').style.display = "none";
                document.getElementById('fest-offer').style.display = "block";
            } else {
                mainHeading.innerText = "Choose Your Style";
                timerBox.style.display = "none";
                clearInterval(timerInterval);
                document.getElementById('best-price').style.display = "block";
                document.getElementById('fest-offer').style.display = "none";
            }
            updateUI();
        }
    }

    function startCountdown(fest) {
        clearInterval(timerInterval);
        function update() {
            const now = new Date();
            let endYear = now.getFullYear();
            if (fest.name.includes("New Year 2027") && fest.end.month === 1) endYear = now.getFullYear() + 1;
            const target = new Date(endYear, fest.end.month - 1, fest.end.date, fest.end.hour, fest.end.min);
            const diff = target - now;
            if (diff <= 0) { clearInterval(timerInterval); checkFestivalRealTime(); return; }
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timerClock').innerText = `${d}d ${h.toString().padStart(2,'0')}h ${m.toString().padStart(2,'0')}m ${s.toString().padStart(2,'0')}s`;
        }
        update();
        timerInterval = setInterval(update, 1000);
    }

    function selectStyle(s) {
        activeStyle = s;
        document.querySelectorAll('.btn-combo').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + s).classList.add('active');
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        document.getElementById('dot-' + s).classList.add('active');
        updateUI();
    }

    function changeQty(v) {
        qty = Math.max(1, qty + v);
        document.getElementById('qtyDisplay').innerText = qty;
        updateUI();
    }

    function handleDeliveryClick() {
        updateUI();
        // document.getElementById('detailsSection').scrollIntoView({ behavior: 'smooth' });
    }

    function updateUI() {
        const data = currentFestival ? PRICES_OFFER : PRICES_NORMAL;
        const currentPrice = data[activeStyle];
        
        document.getElementById('displayImg').src = IMAGE_PATHS[activeStyle];
        document.getElementById('labelPrice').innerText = currentPrice * qty;
        
        // Update Off Badge
        const offBadge = document.getElementById('offBadge');
        
        if (currentFestival) {
            const normalVal = PRICES_NORMAL[activeStyle];
            offBadge.style.display = "inline-block";
            
            const offPercent = Math.round(((normalVal - currentPrice) / normalVal) * 100);
            offBadge.innerText = `${offPercent}% Off`;
        } else {
            offBadge.style.display = "none";
        }

        // Populate Design Highlights Grid
        const grid = document.getElementById('highlightsGrid');
        const items = [
            { label: "Design type", value: activeStyle === 'simple' ? "Simple" : "Creative" },
            { label: "Revisions", value: activeStyle === 'simple' ? "Limited Revisions" : "Unlimited Revisions" },
            { label: "Quality", value: "High Quality Print Files" },
            { label: "Delivery", value: "Fast Delivery" }
        ];

        grid.innerHTML = items.map(item => `
            <div class="highlight-card">
                <span class="hl-label">${item.label}</span>
                <span class="hl-value">${item.value}</span>
            </div>
        `).join('');
    }

    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    menuToggle.onclick = () => navLinks.classList.toggle('active');

  function sendToWhatsApp() {
    // 1. Get values from inputs
    const sizeInput = document.getElementById('sizeInput');
    const deliveryInput = document.getElementById('deliveryInput');
    
    const sizeVal = sizeInput ? sizeInput.value.trim() : "";
    const deliveryVal = deliveryInput ? deliveryInput.value : "Not Specified";

    // 2. Format the Type text based on your active style
    const typeText = activeStyle === 'creative' ? "Creative Design" : "Branding Design";

    // 3. Construct the Message (Price lines completely removed)
    const msg = `%20%20%20%20%20%20%20%20%20%20*DESIGN ORDER*%0A%0A` +
                `*Services* : Menu Card Design%0A` +
                `*Type* : ${typeText}%0A` +
                (sizeVal !== "" ? `*Size* : ${sizeVal}%0A` : "") + 
                `*Delivery* : ${deliveryVal}%0A` +
                `*Qty* : ${qty} nos%0A` +
                `----------------------------------`;

    // 4. Open WhatsApp
    window.open(`https://wa.me/7845188347?text=${msg}`, '_blank');
}
</script>
